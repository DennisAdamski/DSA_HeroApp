name: dsa_heldenverwaltung
description: "A DSA Hero Application"
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  file_picker: ^10.3.10
  path: ^1.9.1
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  uuid: ^4.5.1
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.8

msix_config:
  display_name: Heldenverwaltung
  publisher_display_name: Adamski
  identity_name: Adamski.Heldenverwaltung
  publisher: CN=1CE2B320-2BCD-4E40-9D73-3F57CE79C640
  msix_version: 1.0.1.0
  logo_path: assets/msix/heldenmanager_icon_500.png
  capabilities: internetClient
  languages: de-DE, en-US
  store: true

flutter:
  uses-material-design: true
  assets:
    - assets/catalogs/house_rules_v1/
    - assets/heroes/
    - assets/ui/codex/
  fonts:
    - family: Merriweather
      fonts:
        - asset: assets/fonts/merriweather/Merriweather.ttf
        - asset: assets/fonts/merriweather/Merriweather.ttf
          weight: 700
    - family: Cinzel
      fonts:
        - asset: assets/fonts/cinzel/Cinzel.ttf
        - asset: assets/fonts/cinzel/Cinzel.ttf
          weight: 700

